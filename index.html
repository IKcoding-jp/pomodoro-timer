<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>ポモドーロタイマー</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="card">
    <div class="settings">
      <label>作業 <input type="number" id="workTime" value="25"> 分</label>
      <label>休憩 <input type="number" id="breakTime" value="5"> 分</label>
    </div>

    <h1>25:00</h1>

    <div class="buttons">
      <button id="reset">リセット</button>
      <button id="start">スタート</button>
    </div>

    <p id="sessionCount">セッション:0</p>
  </div>

  <script src="script.js"></script>

</body>

</html>
