<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Pomo</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍅%3C/text%3E%3C/svg%3E"
    />
  </head>

  <body>
    <div class="card">
      <div class="settings">
        <label>作業 <input type="number" id="workTime" value="25" /> 分</label>
        <label>休憩 <input type="number" id="breakTime" value="5" /> 分</label>
        <label>自動 <input type="checkbox" id="autoStart" /></label>
      </div>

      <svg class="ring" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="90" />
        <circle class="ring-progress" cx="100" cy="100" r="90" />
        <text class="ring-time" x="100" y="100">25:00</text>
      </svg>

      <div class="buttons">
        <button id="reset">リセット</button>
        <button id="start">スタート</button>
      </div>

      <div id="sessionDots" class="session-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <p id="todayStats">今日: 0セッション / 0分</p>

      <button id="showStats">📊 統計</button>

      <button id="debug">デバッグ</button>
    </div>

    <div id="statsModal" class="modal hidden">
      <div class="modal-content">
        <button id="closeStats">✕</button>
        <h2>過去７日の学習</h2>
        <div id="barChart" class="bar-chart" ></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
